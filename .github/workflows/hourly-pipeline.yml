name: Hourly AI Content Pipeline

on:
  schedule:
    # Pipeline PAUSED due to Google content quality warning
    # Re-enable when content standards are met
    # - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run pipeline
        run: npx tsx scripts/run-pipeline.ts
        env:
          CI: true
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}

      - name: Commit and push
        run: |
          git config user.name "pipeline-bot"
          git config user.email "bot@aitutorialshub.com"
          git add content/ public/images/auto/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: pipeline update"
            git push origin main
          fi

      - name: Deploy to Vercel
        run: |
          git pull origin main
          npm install
          npx vercel deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_RbRdvq0IYLtW6AXPjvlzp7u7
          VERCEL_PROJECT_ID: prj_MNXaz3Pi5WaqpjgAf8EWtkvRnwJl
